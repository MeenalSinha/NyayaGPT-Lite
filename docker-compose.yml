version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyayagpt-backend
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/models/nyayagpt-final
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./models:/models
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nyayagpt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyayagpt-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - nyayagpt-network

networks:
  nyayagpt-network:
    driver: bridge

volumes:
  models:
    driver: local
